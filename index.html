<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>IKA Car Runner</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="stylesheet" href="assets/styles/main.css" />
  </head>
  <body>
    <div id="gameCanvasHost"></div>
    <div class="settingsWrap">
      <button id="settingsToggleBtn" class="settingsToggleBtn" type="button" aria-label="Open settings" aria-expanded="false">
        <span class="settingsToggleIcon" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
      <div id="settingsPanel" class="settingsPanel" aria-label="Game settings" hidden>
        <div class="settingsTitle">Settings</div>
        <div class="settingsMenu">
          <button id="musicMenuBtn" class="settingMenuItem" type="button">
            <span class="settingMenuLabel">Music</span>
            <span id="musicMenuValue" class="settingMenuValue">On</span>
          </button>
          <button id="soundMenuBtn" class="settingMenuItem" type="button">
            <span class="settingMenuLabel">Sound</span>
            <span id="soundMenuValue" class="settingMenuValue">On</span>
          </button>
          <button id="pauseMenuBtn" class="settingMenuItem" type="button" hidden>
            <span class="settingMenuLabel">Pause</span>
            <span id="pauseMenuValue" class="settingMenuValue">Off</span>
          </button>
          <button id="exitMenuBtn" class="settingMenuItem" type="button" hidden>
            <span class="settingMenuLabel">Exit</span>
            <span class="settingMenuValue">Menu</span>
          </button>
          <button id="resolutionMenuBtn" class="settingMenuItem" type="button">
            <span class="settingMenuLabel">Resolution</span>
            <span id="resolutionMenuValue" class="settingMenuValue">High</span>
          </button>
        </div>
      </div>
    </div>

    <div id="startScreen">
      <div class="bg"></div>

      <div class="startSection top">
        <div class="previewStage">
          <div id="previewCanvasHost" class="previewCanvasHost"></div>
        </div>
      </div>

      <div class="startSection middle">
        <div class="menuMeta">Urban highway sprint</div>
        <img id="gameLogo" src="assets/images/ika-car-runner1.png" alt="IKA Car Runner" />
      </div>

      <div class="startSection bottom">
        <div class="startControls">
          <button id="startBtn" class="start-btn" type="button">
            <img src="assets/images/start.png" alt="Start Game" />
          </button>
          <label class="modeSelectWrap" for="climateModeToggle">
            <span class="modeSelectLabel">Climate Mode</span>
            <span class="modeSelectHelper">Choose the road mood before you launch</span>
            <div id="climateModeButtons" class="climateButtonGroup" role="group" aria-label="Climate mode options">
              <button class="climateOptionBtn" type="button" data-mode="sunny">Sunny</button>
              <button class="climateOptionBtn" type="button" data-mode="night">Night</button>
              <button class="climateOptionBtn" type="button" data-mode="rainny">Rainy</button>
              <button class="climateOptionBtn" type="button" data-mode="snow">Snow</button>
              <button class="climateOptionBtn" type="button" data-mode="mixed">Dynamic</button>
            </div>
            <select id="climateModeToggle" class="modeSelect srOnly">
              <option value="sunny">Sunny</option>
              <option value="night">Night</option>
              <option value="rainny">Rainy</option>
              <option value="snow">Snow</option>
              <option value="mixed">Dynamic</option>
            </select>
          </label>
          <div class="colorHint">Pick your Car color</div>
          <div id="colorPicker">
            <div class="colorDot" data-color="0x1e90ff" style="background: #1e90ff"></div>
            <div class="colorDot" data-color="0xe53935" style="background: #e53935"></div>
            <div class="colorDot" data-color="0x43a047" style="background: #43a047"></div>
            <div class="colorDot" data-color="0xffb300" style="background: #ffb300"></div>
            <div class="colorDot" data-color="0x8e24aa" style="background: #8e24aa"></div>
          </div>
          <div class="startTips" aria-label="How to play">
            <div class="startTipCard">
              <span class="startTipLabel">Swipe</span>
              <strong>Dodge traffic fast</strong>
            </div>
            <div class="startTipCard">
              <span class="startTipLabel">Jump</span>
              <strong>Tap space to clear danger</strong>
            </div>
            <div class="startTipCard">
              <span class="startTipLabel">Score</span>
              <strong>Push longer runs for more points</strong>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="hud">
      <div class="stat">
        <span class="statLabel">Score</span>
        <span id="score">0</span>
      </div>
    </div>
    <span id="level" class="srOnly">1</span>
    <span id="speed" class="srOnly">0.0</span>

    <button id="soundToggle" class="floatingControl legacyControl" type="button" aria-label="Toggle sound">
      <img id="soundIcon" src="assets/images/sound-on.png" alt="Sound" width="40" height="40" />
    </button>

    <button id="pauseBtn" class="floatingControl legacyControl" type="button" aria-label="Pause game">
      <img id="pauseIcon" src="assets/images/pause.png" alt="Pause" width="40" height="40" />
    </button>

    <div id="gameOver">
      <img id="gameOverImg" src="assets/images/gameover.png" alt="Game Over" />
      <div class="goTitle">Run Ended</div>
      <div class="goSubtitle">Traffic caught you. Reset, refine your line, and launch again.</div>
      <div class="goStats">
        <div>
          Score
          <span id="finalScore">0</span>
        </div>
        <div>
          Level
          <span id="finalLevel">1</span>
        </div>
      </div>
      <div class="goActions">
        <button id="reviveBtn" class="goBtn revive" type="button">Watch Ad & Continue</button>
        <button id="restartBtn" class="goBtn" type="button">Restart</button>
        <button id="menuBtn" class="goBtn ghost" type="button">Main Menu</button>
      </div>
    </div>
    <div id="impactFlash" aria-hidden="true"></div>

    <audio id="engine" src="assets/audio/engine.wav" loop></audio>
    <audio id="crash" src="assets/audio/crash.mp3"></audio>
    <audio id="sunnyMusic" src="assets/audio/Sunny_Music.mp3" loop autoplay playsinline></audio>
    <audio id="rainnyMusic" src="assets/audio/Rainny_Music.mp3" loop autoplay playsinline></audio>

    <script src="assets/script/Three_Min.js"></script>
    <script src="assets/script/three-object-factories.js"></script>
    <script src="assets/script/game-config.js"></script>
    <script src="assets/script/game.js"></script>
  </body>
</html>
